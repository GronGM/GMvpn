name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e .

      - name: Compile sources
        run: python -m compileall src tests

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

  xray-config-smoke:
    runs-on: ubuntu-latest
    needs: test
    env:
      XRAY_VERSION: v26.3.27

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: python -m pip install -e .

      - name: Install pinned Xray binary
        run: |
          curl -fsSL -o /tmp/xray.zip "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-linux-64.zip"
          unzip -o /tmp/xray.zip xray -d /tmp/xray-bin
          chmod +x /tmp/xray-bin/xray
          /tmp/xray-bin/xray version

      - name: Validate representative Xray configs
        run: PYTHONPATH=src python tools/xray_config_smoke.py --xray-binary /tmp/xray-bin/xray --validation-inbound-mode socks --validate-with-xray
